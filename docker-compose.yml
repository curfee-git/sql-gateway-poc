services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./src/infrastructure/persistence/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d demo"]
      interval: 2s
      timeout: 2s
      retries: 15

  gateway:
    build: .
    environment:
      DATABASE_ADAPTER: postgres
      DATABASE_URL: postgresql://agent_rw:agent_pw@postgres:5432/demo
      QUERY_TIMEOUT_MS: "5000"
      MAX_RESULTS: "1000"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readiness"]
      interval: 10s
      timeout: 3s
      retries: 3
